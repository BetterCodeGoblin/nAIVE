name: Editor Test Scene
settings:
  ambient_light: [0.15, 0.15, 0.2]
  gravity: [0, -9.81, 0]
entities:
  - id: editor_ground
    tags: [ground]
    components:
      transform:
        position: [0, -0.5, 0]
        rotation: [0, 0, 0]
        scale: [20, 1, 20]
      mesh_renderer:
        mesh: procedural:cube
        material: procedural:default
        cast_shadows: true
        receive_shadows: true

  - id: editor_marker
    tags: [marker]
    components:
      transform:
        position: [0, 0.5, 0]
        rotation: [0, 0, 0]
        scale: [1, 1, 1]
      mesh_renderer:
        mesh: procedural:cube
        material: procedural:default
        cast_shadows: true
        receive_shadows: true

  - id: editor_sun
    tags: [light]
    components:
      transform:
        position: [0, 10, 0]
      directional_light:
        direction: [0.3, -1.0, 0.5]
        color: [1.0, 0.95, 0.9]
        intensity: 3.0
        shadow_extent: 30.0

  - id: editor_key_light
    tags: [light]
    components:
      transform:
        position: [5, 8, 5]
      point_light:
        color: [1.0, 0.9, 0.8]
        intensity: 50.0
        range: 30.0

  - id: editor_fill_light
    tags: [light]
    components:
      transform:
        position: [-5, 6, -3]
      point_light:
        color: [0.6, 0.7, 1.0]
        intensity: 30.0
        range: 25.0

  - id: editor_camera
    components:
      transform:
        position: [0, 3, 8]
      camera:
        fov: 75
        near: 0.1
        far: 500
        role: main
        mode: first_person
