name: Bouncing Balls
settings:
  ambient_light: [0.15, 0.15, 0.2]
  gravity: [0, -9.81, 0]

entities:
  - id: ground
    tags: [ground]
    components:
      transform:
        position: [0, -0.5, 0]
        scale: [20, 1, 20]
      mesh_renderer:
        mesh: "procedural:cube"
        material: "procedural:default"
        cast_shadows: true
        receive_shadows: true
      collider:
        shape: box
        half_extents: [10.0, 0.5, 10.0]
        restitution: 0.5
        friction: 0.5

  - id: sun
    tags: [light]
    components:
      directional_light:
        direction: [0.3, -1.0, 0.5]
        color: [1.0, 0.95, 0.9]
        intensity: 3.0
        shadow_extent: 30.0

  - id: key_light
    tags: [light]
    components:
      transform:
        position: [5, 8, 5]
      point_light:
        color: [1.0, 0.9, 0.8]
        intensity: 50.0
        range: 30.0

  - id: fill_light
    tags: [light]
    components:
      transform:
        position: [-5, 6, -3]
      point_light:
        color: [0.6, 0.7, 1.0]
        intensity: 30.0
        range: 25.0

  - id: camera
    components:
      transform:
        position: [0, 5, 15]
      camera:
        fov: 75
        near: 0.1
        far: 500
        role: main

  - id: ball_0
    tags: [ball]
    components:
      transform:
        position: [2.23, 5.38, -3.6]
        scale: [0.41, 0.41, 0.41]
      mesh_renderer:
        mesh: "procedural:sphere"
        material: "procedural:default"
