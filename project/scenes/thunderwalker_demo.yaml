name: "Thunderwalker Demo — The Wendigo at Frozen Creek"
settings:
  ambient_light: [0.08, 0.10, 0.18]
  gravity: [0, -9.81, 0]

entities:

  # ── Player (Seeker) ───────────────────────────────────────────────────────
  - id: player
    tags: [player]
    components:
      transform:
        position: [0, 2, 10]
      mesh_renderer:
        mesh: procedural:cube
        material: assets/materials/blue.yaml
      camera:
        fov: 75
        near: 0.1
        far: 200
        role: main
        mode: third_person
        distance: 6.0
        height_offset: 2.0
        pitch_limits: [-45, 60]
      character_controller:
        move_speed: 5.0
        sprint_multiplier: 1.8
        jump_impulse: 6.0
        step_height: 0.3
        height: 1.8
        radius: 0.3
      health:
        max: 100
      script:
        source: logic/third_person_demo.lua

  # ── Terrain — frozen forest clearing ─────────────────────────────────────
  - id: ground
    components:
      transform:
        position: [0, -0.5, 0]
        scale: [70, 1, 70]
      mesh_renderer:
        mesh: procedural:cube
        material: assets/materials/default.yaml
      collider:
        shape: box
        half_extents: [35, 0.5, 35]

  # ── Campfire ──────────────────────────────────────────────────────────────
  - id: campfire_base
    components:
      transform:
        position: [0, 0.4, 6]
        scale: [1.6, 0.8, 1.6]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.8, 0.4, 0.8]
      rigid_body:
        body_type: fixed

  - id: campfire_flame
    components:
      transform:
        position: [0, 1.3, 6]
        scale: [0.7, 1.1, 0.7]
      mesh_renderer:
        mesh: procedural:sphere
        material: assets/materials/titan_ember.yaml

  - id: campfire_light
    components:
      transform:
        position: [0, 1.8, 6]
      point_light:
        color: [1.0, 0.55, 0.15]
        intensity: 18.0
        range: 22.0

  # ── Wendigo (boss enemy) ──────────────────────────────────────────────────
  - id: wendigo
    tags: [enemy]
    components:
      transform:
        position: [0, 2, -28]
        scale: [1.5, 4.5, 1.5]
      mesh_renderer:
        mesh: procedural:cube
        material: assets/materials/default.yaml
      health:
        max: 200
      collider:
        shape: box
        half_extents: [0.75, 2.25, 0.75]
      rigid_body:
        body_type: fixed
      script:
        source: logic/wendigo_demo.lua

  # ── Forest treeline — north boundary (behind Wendigo) ────────────────────
  - id: tree_n01
    components:
      transform:
        position: [-12, 4, -32]
        scale: [1.2, 8.0, 1.2]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.6, 4.0, 0.6]

  - id: tree_n02
    components:
      transform:
        position: [0, 4, -33]
        scale: [1.0, 8.0, 1.0]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.5, 4.0, 0.5]

  - id: tree_n03
    components:
      transform:
        position: [12, 4, -32]
        scale: [1.3, 8.0, 1.3]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.65, 4.0, 0.65]

  # ── Forest treeline — south boundary (behind player spawn) ────────────────
  - id: tree_s01
    components:
      transform:
        position: [-10, 4, 22]
        scale: [1.1, 7.0, 1.1]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.55, 3.5, 0.55]

  - id: tree_s02
    components:
      transform:
        position: [0, 4, 24]
        scale: [1.0, 8.0, 1.0]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.5, 4.0, 0.5]

  - id: tree_s03
    components:
      transform:
        position: [11, 4, 22]
        scale: [1.2, 7.0, 1.2]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.6, 3.5, 0.6]

  # ── Forest treeline — east / west flanks ─────────────────────────────────
  - id: tree_e01
    components:
      transform:
        position: [20, 4, 0]
        scale: [1.2, 8.0, 1.2]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.6, 4.0, 0.6]

  - id: tree_e02
    components:
      transform:
        position: [22, 4, -14]
        scale: [1.0, 7.0, 1.0]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.5, 3.5, 0.5]

  - id: tree_w01
    components:
      transform:
        position: [-20, 4, 0]
        scale: [1.3, 8.0, 1.3]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.65, 4.0, 0.65]

  - id: tree_w02
    components:
      transform:
        position: [-22, 4, -14]
        scale: [1.1, 7.0, 1.1]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.55, 3.5, 0.55]

  # ── Scatter rocks (cover geometry) ───────────────────────────────────────
  - id: rock_01
    components:
      transform:
        position: [5, 0.6, -8]
        scale: [2.0, 1.2, 1.8]
      mesh_renderer:
        mesh: procedural:cube
        material: assets/materials/stone.yaml
      collider:
        shape: box
        half_extents: [1.0, 0.6, 0.9]

  - id: rock_02
    components:
      transform:
        position: [-7, 0.5, -12]
        scale: [1.8, 1.0, 2.2]
      mesh_renderer:
        mesh: procedural:cube
        material: assets/materials/stone.yaml
      collider:
        shape: box
        half_extents: [0.9, 0.5, 1.1]

  - id: rock_03
    components:
      transform:
        position: [9, 0.6, 2]
        scale: [2.2, 1.2, 1.6]
      mesh_renderer:
