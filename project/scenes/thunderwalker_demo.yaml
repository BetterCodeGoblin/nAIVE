name: "Thunderwalker Demo — The Wendigo at Frozen Creek"

# ════════════════════════════════════════════════════════════════════════════
# SEEKER LINEAGE OPTIONS
# ════════════════════════════════════════════════════════════════════════════
# This scene supports multiple Seeker lineages. To select a lineage, modify
# the player entity's `seeker_lineage` property below, or select via in-game UI.
#
# Available Lineages:
#   - walks-in-thunder   (Lakota-inspired, Spirit Lance, +1 stamina segment)
#   - river-keeper       (Ojibwe-inspired, Storm Bow, +2s Spirit Vision duration)
#   - red-earth-walker   (Navajo/Diné-inspired, Medicine Blade, +1 extra crafting component)
#   - stone-tongue       (Haudenosaunee-inspired, Bone Club, +15% stagger resistance)
#   - sky-weaver         (Wyandotte/Wendat-inspired, Trading Hatchet, Clan-based buffs)
#
# NEW: Sky-Weaver (Wyandotte) Lineage
# Unique Mechanics:
#   - Starting Weapon: Trading Hatchet (fast, +1 component crafting)
#   - Clan System: Choose Turtle, Bear, or Beaver clan for unique bonuses
#   - Sky World Sight: Powerful meditation ability for enhanced detection
#   - Exchange Strike: Ability to transfer Spirit charges in multiplayer/co-op
#
# Learn more: See THUNDERWALKER_GDD.md Section 2a (The Sky-Weaver)
# ════════════════════════════════════════════════════════════════════════════

settings:
  ambient_light: [0.08, 0.10, 0.18]
  gravity: [0, -9.81, 0]

entities:

  # ── Player (Seeker) ───────────────────────────────────────────────────────
  # To use the Sky-Weaver (Wyandotte) lineage, uncomment the seeker_lineage line
  # and set it to: seeker_lineage: sky-weaver
  - id: player
    tags: [player]
    # Seeker lineage: Choose from walks-in-thunder, river-keeper, red-earth-walker,
    # stone-tongue, or sky-weaver (Wyandotte). Default: walks-in-thunder
    seeker_lineage: walks-in-thunder  # Change to 'sky-weaver' to try the Wyandotte lineage
    components:
      transform:
        position: [0, 2, 10]
      mesh_renderer:
        mesh: assets/meshes/ranger_seeker.glb
        material: assets/materials/blue.yaml
      camera:
        fov: 75
        near: 0.1
        far: 200
        role: main
        mode: third_person
        distance: 6.0
        height_offset: 2.0
        pitch_limits: [-45, 60]
      character_controller:
        move_speed: 5.0
        sprint_multiplier: 1.8
        jump_impulse: 6.0
        step_height: 0.3
        height: 1.8
        radius: 0.3
      health:
        max: 100
      script:
        source: logic/third_person_demo.lua

  # ── Terrain — frozen forest clearing ─────────────────────────────────────
  - id: ground
    components:
      transform:
        position: [0, -0.5, 0]
        scale: [70, 1, 70]
      mesh_renderer:
        mesh: procedural:cube
        material: assets/materials/default.yaml
      collider:
        shape: box
        half_extents: [35, 0.5, 35]

  # ── Campfire ──────────────────────────────────────────────────────────────
  - id: campfire_base
    components:
      transform:
        position: [0, 0.4, 6]
        scale: [1.6, 0.8, 1.6]
      mesh_renderer:
        mesh: procedural:cylinder
        material: assets/materials/wood.yaml
      collider:
        shape: box
        half_extents: [0.8, 0.4, 0.8]
      rigid_body:
        body_type: fixed

  - id: campfire_flame
    components:
      transform:
        position: [0, 1.3, 6]
        scale: [0.7, 1.1, 0.7]
      mesh_renderer:
        mesh: procedural:sphere
        material: assets/materials/titan_ember.yaml

  - id: campfire_light
    components:
      transform:
        position: [0, 1.8, 6]
      point_light:
        color: [1.0, 0.55, 0.15]
        intensity: 18.0
        range: 22.0

