  # ── Lighting ─────────────────────────────────────────────────────────────
  - id: moonlight
    components:
      transform:
        position: [-15, 35, 12]
      point_light:
        color: [0.55, 0.60, 0.85]
        intensity: 18.0
        range: 90.0

  - id: fill_light
    components:
      transform:
        position: [12, 18, -10]
      point_light:
        color: [0.25, 0.28, 0.45]
        intensity: 6.0
        range: 55.0
